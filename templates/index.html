<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Мій Бюджетний Дашборд</title>
    <style>
        body { font-family: 'Segue UI', Tahoma, Geneva, Verdana, sans-serif; margin: 40px; background-color: #f0f2f5; }
        .container { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px RGBA(0,0,0,0.1); }
        h1 { color: red; border-bottom: 2px solid #1a73e8; padding-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background-color: #f8f9fa; color: #5f6368; text-transform: uppercase; font-size: 12px; }
        tr:hover { background-color: #f1f3f4; }
        .amount { font-weight: bold; color: #d93025; }
        .stats-grid { display: flex; gap: 20px; margin-bottom: 30px; }
        .card { background: white; padding: 20px; border-radius: 10px; flex: 1; box-shadow: 0 4px 6px RGBA(0,0,0,0.05); transition: transform 0.2s }
        .card:hover { transform: translateY(-5px); box-shadow: 0 8px 15px RGBA(0,0,0,0.01) }
        .card h3 { margin: 0; color: #5f6368; font-size: 14px; text-transform: uppercase; }
        .card p { margin: 10px 0 0; font-size: 24px; font-weight: bold; color: #1a73e8; }
    </style>
</head>
<body>
    <div class="stats-grid">
        <div class="card">
            <h3>Загалом витрачено</h3>
            <p>{{ total }} ₴</p>
        </div>
        <div class="card">
            <h3>Кількість операцій</h3>
            <p>{{ count }}</p>
        </div>
        <div class="card" style="background: {{ status_color }};">
            <h3>Статус бюджету</h3>
            <p>{{ status }}</p>
        </div>
    </div>

    <div class="conteiner">
        <h1>Звіт для користувача ID: {{ user_id }}</h1>
        <table>
            <thead>
                <tr>
                    <th>Дата</th>
                    <th>Категорія</th>
                    <th>Сума (грн)</th>
                </tr>
            </thead>
            <tbody>
                {% for item in expenses %}
                <tr>
                    <td>{{ item.date }}</td>
                    <td>{{ item.category }}</td>
                    <td class="amount">{{ item.amount }} ₴</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>
